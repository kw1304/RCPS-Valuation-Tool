name: Update Stock Listings CSV (KRX + NASDAQ + NYSE + AMEX)

on:
  schedule:
    # 매주 월요일 00:00 UTC (한국 오전 9시 = 장 시작 시각)
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FinanceDataReader
        run: pip install finance-datareader pandas

      - name: Fetch listings (KRX + NASDAQ + NYSE + AMEX)
        run: |
          python <<'EOF'
          import FinanceDataReader as fdr
          import os
          os.makedirs('rcps_valuation/data', exist_ok=True)
          # KRX (코스피·코스닥·코넥스 통합) — Code/Name/Market/Marcap
          krx = fdr.StockListing('KRX')
          krx[['Code','Name','Market','Marcap']].to_csv(
              'rcps_valuation/data/krx_listing.csv', index=False, encoding='utf-8')
          print(f'KRX: {len(krx)} stocks')
          # 미국 거래소 — Symbol/Name (marcap 없음)
          for mk, fn in [('NASDAQ','nasdaq_listing.csv'),
                         ('NYSE','nyse_listing.csv'),
                         ('AMEX','amex_listing.csv')]:
              df = fdr.StockListing(mk)
              df[['Symbol','Name']].to_csv(
                  f'rcps_valuation/data/{fn}', index=False, encoding='utf-8')
              print(f'{mk}: {len(df)} stocks')
          EOF

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet rcps_valuation/data/ || echo "changed=1" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rcps_valuation/data/
          git commit -m "Auto-update stock listings CSV (KRX + NASDAQ + NYSE + AMEX, weekly cron)"
          git push
