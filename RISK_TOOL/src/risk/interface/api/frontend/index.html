<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>감사전 리스크 확인 툴 · Pre-Audit Risk</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --bg:#F9FAFB; --bg2:#FFFFFF; --bg3:#F2F4F6;
  --border:#E5E8EB;
  --accent:#3182F6; --accent2:#1B64DA;
  --green:#00C073; --red:#F04452; --amber:#FF9F00; --purple:#7C3AED;
  --text:#191F28; --text2:#4E5968; --text3:#8B95A1;
  --sans:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;
  --radius:10px; --shadow:0 1px 2px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;font-size:14px;display:flex;flex-direction:column;min-height:100%}

/* WAT 표준 헤더 */
header{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:1rem 2rem 1rem 7.25rem;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;flex-wrap:nowrap;gap:1rem;min-height:76px;position:sticky;top:0;z-index:100}
@media (max-width:768px){header{padding:0.7rem 1rem;min-height:0}}
.hd-title{min-width:0}
.hd-title h1{font-size:1.05rem;font-weight:700;color:var(--text);letter-spacing:-0.04em}
.hd-title h1 .ac{color:var(--accent);font-weight:800}
.hd-title p{font-size:0.72rem;color:var(--text3);margin-top:0.2rem;font-weight:400;letter-spacing:-0.01em}

main{flex:1;max-width:1120px;width:100%;margin:0 auto;padding:1.5rem 2rem}
@media (max-width:768px){main{padding:1rem}}

/* 입력 패널 */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:1.1rem 1.25rem;display:flex;gap:.9rem;align-items:flex-end;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:.3rem}
.field label{font-size:.72rem;color:var(--text3);font-weight:600;letter-spacing:-0.01em}
.field input,.field select{padding:.55rem .75rem;border:1px solid var(--border);border-radius:8px;
  background:var(--bg2);color:var(--text);font-family:var(--sans);font-size:.9rem;min-width:200px}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.field.year input{min-width:110px}
.field.narrow input,.field.narrow select{min-width:96px}
.btn{padding:.6rem 1.1rem;border-radius:8px;border:1px solid var(--accent);background:var(--accent);
  color:#fff;font-family:var(--sans);font-size:.88rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--accent2);border-color:var(--accent2)}
.btn.ghost{background:var(--bg2);color:var(--text2);border-color:var(--border)}
.btn.ghost:hover{background:var(--bg3);border-color:var(--text3)}

.status{margin:1rem 0 .2rem;color:var(--text2);font-size:.85rem;display:flex;align-items:center;gap:.45rem;flex-wrap:wrap}
.status:empty{display:none}
.status b{color:var(--accent);font-variant-numeric:tabular-nums;font-weight:700}
.status .wait-hint{color:var(--text3);font-weight:400}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;display:inline-block;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* 종합등급 */
.grade-bar{display:flex;align-items:center;gap:.7rem;margin:1.1rem 0 .4rem;flex-wrap:wrap}
.grade{display:inline-flex;align-items:center;gap:.4rem;padding:.45rem 1rem;border-radius:999px;
  font-weight:800;font-size:1rem;letter-spacing:-0.02em}
.grade.높음{background:#FEECEC;color:var(--red)}
.grade.보통{background:#FFF4E0;color:#B26A00}
.grade.낮음{background:#E6F9F0;color:#00875A}
.grade-meta{color:var(--text3);font-size:.82rem}

/* 4축 카드 */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.9rem;margin-top:.8rem}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:1rem 1.1rem}
.card h3{font-size:.82rem;font-weight:700;color:var(--text2);margin-bottom:.5rem;
  display:flex;align-items:center;gap:.4rem;letter-spacing:-0.02em}
.card h3 .badge{margin-left:auto;font-size:.66rem;font-weight:700;padding:.1rem .45rem;border-radius:6px}
.sig{display:flex;justify-content:space-between;align-items:center;gap:.5rem;
  padding:.4rem 0;border-bottom:1px solid var(--bg3);font-size:.85rem}
.sig:last-child{border-bottom:none}
.sig .lab{display:flex;align-items:center;gap:.45rem;color:var(--text)}
.sig .val{color:var(--text2);font-variant-numeric:tabular-nums;font-weight:600;font-size:.82rem}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.na-hint{color:var(--text3);font-size:.7rem;font-weight:500}
.cmt{font-size:.76rem;color:var(--text3);line-height:1.5;margin:.1rem 0 .4rem 1rem}

/* 외부 리스크 / 공시 */
.section-h{font-size:.9rem;font-weight:700;color:var(--text);margin:1.4rem 0 .5rem;letter-spacing:-0.02em}
.ext{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden}
.ext .row{display:flex;justify-content:space-between;align-items:center;gap:.6rem;
  padding:.55rem .9rem;border-bottom:1px solid var(--bg3);font-size:.83rem}
.ext .row:last-child{border-bottom:none}
.ext a{color:var(--accent);text-decoration:none}
.ext a:hover{text-decoration:underline}
.ext .kw{display:inline-block;font-size:.68rem;font-weight:700;color:var(--purple);
  background:#F3EEFF;padding:.05rem .4rem;border-radius:5px;margin-right:.4rem}
.ext .date{color:var(--text3);font-size:.76rem;white-space:nowrap}
.muted{color:var(--text3);padding:.6rem .9rem;font-size:.82rem}

/* AI 구조화 위험이벤트 */
.events{display:flex;flex-direction:column;gap:.6rem}
.ev{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:.8rem 1rem}
.ev-top{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.3rem}
.ev-badge{font-size:.7rem;font-weight:700;padding:.12rem .5rem;border-radius:6px;white-space:nowrap}
.ev-date{color:var(--text3);font-size:.74rem;font-variant-numeric:tabular-nums}
.ev-sum{font-size:.88rem;color:var(--text);font-weight:600;letter-spacing:-0.01em}
.ev-imp{font-size:.76rem;color:var(--text3);margin-top:.2rem;line-height:1.5}
.ev-src{font-size:.74rem;margin-top:.25rem}
.ev-src a{color:var(--accent);text-decoration:none}
.ev-src a:hover{text-decoration:underline}

.alert{background:#FFF4E0;border:1px solid #FFE0A3;color:#8A5A00;border-radius:var(--radius);
  padding:.9rem 1.1rem;font-size:.86rem;margin-top:1rem}

/* 푸터 */
footer.legal{border-top:1px solid var(--border);background:var(--bg2);
  padding:.7rem 2rem .7rem 7.25rem;display:flex;justify-content:space-between;align-items:center;
  font-size:.68rem;color:var(--text3);line-height:1.4;flex-wrap:wrap;gap:12px;flex-shrink:0}
footer.legal b{color:var(--text2);font-weight:600}
footer.legal .right{color:var(--text3);font-weight:500;letter-spacing:.01em}
@media (max-width:768px){footer.legal{padding:.6rem 1rem;flex-direction:column;gap:.3rem;text-align:center}}
</style>
</head>
<body>

<header>
  <div class="hd-title">
    <h1><span class="ac">감사전</span> 리스크 확인 <span class="ac">Tool</span></h1>
    <p>DART 자동 위험 스크리닝 · ISA 315 / 520 / 240 / 570</p>
  </div>
</header>

<main>
  <div class="panel">
    <div class="field">
      <label for="company">회사명</label>
      <input id="company" placeholder="예: 삼성전자">
    </div>
    <div class="field year">
      <label for="year">기준연도</label>
      <input id="year" type="number" value="2024">
    </div>
    <div class="field narrow">
      <label for="matMode">수행중요성</label>
      <select id="matMode" onchange="toggleMat()">
        <option value="auto">자동(보수적)</option>
        <option value="manual">직접 지정</option>
      </select>
    </div>
    <div class="field narrow mat-only" style="display:none">
      <label for="matBench">기준</label>
      <select id="matBench">
        <option value="revenue">매출액</option>
        <option value="total_assets">자산총계</option>
        <option value="pretax_income">세전이익</option>
        <option value="total_equity">자본총계</option>
      </select>
    </div>
    <div class="field narrow mat-only" style="display:none">
      <label for="matRatio">중요성 %</label>
      <input id="matRatio" type="number" step="0.1" min="0" value="0.5">
    </div>
    <div class="field narrow mat-only" style="display:none">
      <label for="pmRatio">수행 %</label>
      <input id="pmRatio" type="number" step="5" min="1" max="100" value="75">
    </div>
    <button class="btn" onclick="run()">리스크 분석</button>
    <button class="btn ghost" onclick="exp()">조서 내보내기</button>
  </div>
  <div id="status" class="status"></div>
  <div id="result"></div>
</main>

<footer class="legal">
  <span><b>Disclaimer.</b> 본 도구는 회계감사 실무 보조용 참고자료이며, 최종 판단과 책임은 사용자에게 있습니다.</span>
  <span class="right">© 2026 Woongcpa</span>
</footer>

<script>
const DOT={red:'#F04452',yellow:'#FF9F00',green:'#00C073',na:'#8B95A1'};
const AX={analytical:'분석적검토 (ISA 520)',fraud:'부정위험 (ISA 240)',going_concern:'계속기업 (ISA 570)'};
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// 사건유형별 배지 색 (배경/글자)
const EVCOL={'소송':['#FEECEC','#F04452'],'횡령·배임':['#FEECEC','#C81E2E'],
  '실적악화':['#FFF4E0','#B26A00'],'지배구조':['#F3EEFF','#7C3AED'],
  '규제·제재':['#FFF0F6','#C2185B'],'자금조달':['#E6F0FF','#1B64DA'],
  '기타':['#F2F4F6','#4E5968']};
function evBadge(t){const c=EVCOL[t]||EVCOL['기타'];
  return '<span class="ev-badge" style="background:'+c[0]+';color:'+c[1]+'">'+esc(t||'기타')+'</span>';}
function isUrl(s){return /^https?:\/\//i.test(s||'');}
const BMLABEL={revenue:'매출액',total_assets:'자산총계',pretax_income:'세전이익',total_equity:'자본총계'};
function toggleMat(){
  const m=document.getElementById('matMode').value==='manual';
  document.querySelectorAll('.mat-only').forEach(e=>e.style.display=m?'flex':'none');
}
function matPayload(){
  if(document.getElementById('matMode').value!=='manual')return {};
  return {mat_benchmark:document.getElementById('matBench').value,
          mat_ratio_pct:+document.getElementById('matRatio').value,
          pm_ratio_pct:+document.getElementById('pmRatio').value};
}

let _timer=null;
function startWait(){
  const t0=Date.now();
  const render=()=>{
    const s=Math.floor((Date.now()-t0)/1000);
    status_.innerHTML='<span class="spin"></span>DART 조회·재무분석·AI 위험요약 중… '
      +'<b>'+s+'초</b> <span class="wait-hint">— AI 구조화에 30~60초 걸릴 수 있습니다. 잠시만요.</span>';
  };
  render(); _timer=setInterval(render,1000);
}
function stopWait(){ if(_timer){clearInterval(_timer);_timer=null;} status_.innerHTML=''; }

async function run(){
  const company=company_.value.trim(), year=+year_.value;
  if(!company){status_.textContent='회사명을 입력하세요.';return;}
  result_.innerHTML='';
  startWait();
  let d;
  try{
    const r=await fetch('/api/assess',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({company,end_year:year,...matPayload()})});
    d=await r.json();
  }catch(e){stopWait();result_.innerHTML='<div class="alert">서버 응답 오류: '+esc(e.message)+'</div>';return;}
  stopWait();
  if(d.error){result_.innerHTML='<div class="alert">⚠ '+esc(d.error)+'</div>';return;}

  let html='<div class="grade-bar"><span class="grade '+esc(d.grade.grade)+'">'+esc(d.grade.grade)
    +'</span><span class="grade-meta">적신호 '+d.grade.red+' · 황신호 '+d.grade.yellow
    +(d.materiality?' · 수행중요성(PM) '+fmtKRW(d.materiality.pm)
        +' ['+(BMLABEL[d.materiality.benchmark]||d.materiality.benchmark)
        +(d.materiality.manual?' 직접':' 자동')+']':'')+'</span></div>';

  html+='<div class="cards">';
  for(const ax of Object.keys(AX)){
    const sigs=(d.signals||[]).filter(s=>s.axis===ax);
    if(!sigs.length)continue;
    const red=sigs.filter(s=>s.level==='red').length, yel=sigs.filter(s=>s.level==='yellow').length;
    let badge='';
    if(red)badge='<span class="badge" style="background:#FEECEC;color:#F04452">적 '+red+'</span>';
    else if(yel)badge='<span class="badge" style="background:#FFF4E0;color:#B26A00">황 '+yel+'</span>';
    else badge='<span class="badge" style="background:#E6F9F0;color:#00875A">정상</span>';
    html+='<div class="card"><h3>'+AX[ax]+badge+'</h3>';
    for(const s of sigs){
      const col=DOT[s.level]||DOT.na;
      const hint=s.level==='na'?' <span class="na-hint">데이터없음</span>':'';
      html+='<div class="sig"><span class="lab"><span class="dot" style="background:'+col+'"></span>'
        +esc(s.label)+hint+'</span><span class="val">'+(s.value==null?'—':fmtNum(s.value))+'</span></div>';
      if(d.comments&&d.comments[s.code])html+='<div class="cmt">'+esc(d.comments[s.code])+'</div>';
    }
    html+='</div>';
  }
  html+='</div>';

  if(d.events&&d.events.length){
    html+='<div class="section-h">구조화 위험 이벤트 (AI)</div><div class="events">';
    for(const e of d.events){
      html+='<div class="ev"><div class="ev-top">'+evBadge(e.type)
        +(e.date?'<span class="ev-date">'+esc(e.date)+'</span>':'')+'</div>'
        +'<div class="ev-sum">'+esc(e.summary)+'</div>'
        +(e.impact?'<div class="ev-imp">재무영향: '+esc(e.impact)+'</div>':'');
      if(e.source){
        html+=isUrl(e.source)
          ?'<div class="ev-src"><a href="'+esc(e.source)+'" target="_blank" rel="noopener">출처</a></div>'
          :'<div class="ev-src">출처: '+esc(e.source)+'</div>';
      }
      html+='</div>';
    }
    html+='</div>';
  }

  if(d.news&&d.news.length){
    html+='<div class="section-h">외부 리스크 (뉴스 원문)</div><div class="ext">';
    for(const n of d.news)html+='<div class="row"><span><span class="kw">'+esc(n.keyword)+'</span>'
      +'<a href="'+esc(n.url)+'" target="_blank" rel="noopener">'+esc(n.title)+'</a></span>'
      +'<span class="date">'+esc(n.date)+'</span></div>';
    html+='</div>';
  }
  if(d.disclosures&&d.disclosures.length){
    html+='<div class="section-h">DART 공시 이벤트</div><div class="ext">';
    for(const x of d.disclosures)html+='<div class="row"><span>'+esc(x.report_nm)+'</span>'
      +'<span class="date">'+esc(x.rcept_dt)+'</span></div>';
    html+='</div>';
  }
  if((!d.news||!d.news.length)&&(!d.disclosures||!d.disclosures.length)){
    html+='<div class="section-h">외부 리스크</div><div class="ext"><div class="muted">특이사항 없음 (뉴스 API 미설정 시 뉴스 생략)</div></div>';
  }
  result_.innerHTML=html;
}

async function exp(){
  const company=company_.value.trim();
  if(!company){status_.textContent='회사명을 입력하세요.';return;}
  startWait();
  try{
    const r=await fetch('/api/export',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({company,end_year:+year_.value,...matPayload()})});
    const b=await r.blob(),u=URL.createObjectURL(b),a=document.createElement('a');
    a.href=u;a.download='risk_'+company+'_'+year_.value+'.xlsx';a.click();URL.revokeObjectURL(u);
  }finally{stopWait();}
}

function fmtKRW(v){
  if(v==null)return '—';
  if(v>=1e8)return Math.round(v/1e8).toLocaleString('ko-KR')+'억';
  if(v>=1e4)return Math.round(v/1e4).toLocaleString('ko-KR')+'만';
  return Math.round(v).toLocaleString('ko-KR');
}
function fmtNum(v){
  if(v==null)return '—';
  return (+v).toLocaleString('ko-KR',{minimumFractionDigits:1,maximumFractionDigits:1});
}

const company_=document.getElementById('company'),year_=document.getElementById('year'),
  status_=document.getElementById('status'),result_=document.getElementById('result');
company_.addEventListener('keydown',e=>{if(e.key==='Enter')run();});
</script>
</body>
</html>
