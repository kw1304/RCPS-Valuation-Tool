<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회계기준 AI · WAT</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
:root{
  --bg:#F9FAFB;--bg2:#FFFFFF;--bg3:#F2F4F6;--border:#E5E8EB;
  --accent:#3182F6;--accent2:#1B64DA;--text:#191F28;--text2:#4E5968;--text3:#8B95A1;
  --sans:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);
  font-size:14px;display:flex;flex-direction:column;height:100vh}
header{padding:.9rem 1.4rem .9rem 7.25rem;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:.6rem}
@media (max-width:640px){header{padding-left:1.4rem}}
.htop{display:flex;align-items:center;justify-content:space-between;gap:1rem}
.seg-row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
.fw-seg{display:inline-flex;gap:.25rem;background:var(--bg3);border:1px solid var(--border);
  border-radius:100px;padding:.2rem;align-self:flex-start}
.fw-seg button{font-family:inherit;font-size:.7rem;font-weight:700;color:var(--text2);
  background:transparent;border:0;border-radius:100px;padding:.32rem .8rem;cursor:pointer;white-space:nowrap}
.fw-seg button.on{background:var(--accent);color:#fff}
header h1{font-size:1rem;font-weight:800;letter-spacing:-0.02em}
header h1 span{color:var(--accent)}
header button{font-family:inherit;font-size:.74rem;font-weight:600;color:var(--text2);
  background:var(--bg3);border:1px solid var(--border);border-radius:100px;
  padding:.4rem .9rem;cursor:pointer}
header button:hover{color:var(--accent);border-color:#BFDBFE;background:#EFF6FF}
#stream{flex:1;overflow-y:auto;padding:1.4rem;display:flex;flex-direction:column;gap:1rem}
.msg{max-width:780px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:.4rem}
.msg .who{font-size:.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.msg.user .bubble{background:var(--accent);color:#fff;align-self:flex-end;border-radius:14px 14px 4px 14px}
.msg.ai .bubble{background:var(--bg2);border:1px solid var(--border);border-radius:14px 14px 14px 4px}
.bubble{padding:.85rem 1.1rem;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.bubble a{color:var(--accent)}
/* 마크다운 렌더(done 시 .md 부여) — pre-wrap 해제하고 블록요소 정상 표시 */
.bubble.md{white-space:normal}
.bubble.md h1,.bubble.md h2,.bubble.md h3{line-height:1.3;margin:.7rem 0 .4rem;font-weight:800;letter-spacing:-0.01em}
.bubble.md h1{font-size:1.15rem}.bubble.md h2{font-size:1.02rem}.bubble.md h3{font-size:.92rem}
.bubble.md p{margin:.4rem 0}
.bubble.md ul,.bubble.md ol{margin:.4rem 0;padding-left:1.3rem}
.bubble.md li{margin:.15rem 0}
.bubble.md strong{font-weight:800}
.bubble.md hr{border:0;border-top:1px solid var(--border);margin:.7rem 0}
.bubble.md blockquote{margin:.5rem 0;padding:.3rem .8rem;border-left:3px solid var(--accent);
  background:var(--bg3);border-radius:0 8px 8px 0;color:var(--text2)}
.bubble.md code{background:var(--bg3);border:1px solid var(--border);border-radius:5px;
  padding:.05rem .3rem;font-size:.88em;font-family:ui-monospace,Consolas,monospace}
.bubble.md pre{background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:.7rem .9rem;overflow-x:auto;margin:.5rem 0}
.bubble.md pre code{background:none;border:0;padding:0;font-size:.82rem;line-height:1.5}
.bubble.md table{border-collapse:collapse;width:100%;margin:.5rem 0;font-size:.86rem;display:block;overflow-x:auto}
.bubble.md th,.bubble.md td{border:1px solid var(--border);padding:.35rem .55rem;text-align:left;vertical-align:top}
.bubble.md th{background:var(--bg3);font-weight:700}
.bubble.md tr:nth-child(even) td{background:#FBFCFD}
.note{max-width:780px;width:100%;margin:.1rem auto 0;font-size:.68rem;color:#B45309;
  font-weight:600;line-height:1.4}
.chip{display:inline-flex;align-items:center;gap:.4rem;font-size:.72rem;font-weight:600;
  color:var(--accent);background:#EFF6FF;border:1px solid #BFDBFE;border-radius:100px;
  padding:.3rem .7rem;align-self:flex-start}
form{padding:1rem 1.4rem;background:var(--bg2);border-top:1px solid var(--border);
  display:flex;gap:.7rem;align-items:flex-end}
textarea{flex:1;font-family:inherit;font-size:.9rem;line-height:1.5;resize:none;
  border:1.5px solid var(--border);border-radius:12px;padding:.7rem .9rem;max-height:140px}
textarea:focus{outline:none;border-color:var(--accent)}
form button{font-family:inherit;font-weight:700;color:#fff;background:var(--accent);
  border:0;border-radius:12px;padding:.7rem 1.3rem;cursor:pointer}
form button:disabled{background:var(--text3);cursor:not-allowed}
footer{padding:.5rem 1.4rem;background:var(--bg2);border-top:1px solid var(--border);
  font-size:.64rem;color:var(--text3);text-align:center}
</style>
</head>
<body>
<header>
  <div class="htop">
    <h1><span>웅계사's</span> 회계기준 AI <span>Tool</span></h1>
    <button id="newChat" type="button">+ 새 대화</button>
  </div>
  <div class="seg-row">
    <div class="fw-seg" id="fwSeg" role="group" aria-label="적용 회계기준 선택">
      <button type="button" data-fw="auto">자동 판단</button>
      <button type="button" data-fw="kifrs">K-IFRS</button>
      <button type="button" data-fw="kgaap">일반기업회계기준</button>
    </div>
    <div class="fw-seg" id="modeSeg" role="group" aria-label="응답 모드 선택">
      <button type="button" data-mode="fast" title="지식 기반 즉답 (~수초)">⚡ 빠른답변</button>
      <button type="button" data-mode="grounded" title="웹 검색·질의회신 출처 링크 (~수십초)">🔍 정밀검색</button>
    </div>
  </div>
</header>
<div id="stream"></div>
<form id="askForm">
  <textarea id="q" rows="1" placeholder="회계기준 해석/적용 질문을 입력하세요 (Shift+Enter 줄바꿈)"></textarea>
  <button id="send" type="submit">질문</button>
</form>
<footer>본 답변은 참고용이며 최종 판단과 책임은 사용자에게 있습니다. · 검색 근거 기반 · 조문번호는 원문 확인 권고</footer>
